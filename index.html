<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Heart Rate Monitor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            text-align: center;
        }
        .bpm-display {
            font-size: 6rem;
            font-weight: bold;
            margin: 20px 0;
            color: #ff3366;
        }
        .pulse {
            animation: beat 1s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.1); }
        }
        button {
            background-color: #ff3366;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
        }
        button:disabled {
            background-color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="heart-icon" style="font-size: 4rem;">❤️</div>
    <div class="bpm-display"><span id="bpm">--</span> BPM</div>
    <button id="connect-btn">Connect Monitor</button>
    <p id="status">Click the button to pair your BLE monitor.</p>
</div>

<script>
    const connectBtn = document.getElementById('connect-btn');
    const bpmDisplay = document.getElementById('bpm');
    const statusText = document.getElementById('status');
    const heartIcon = document.getElementById('heart-icon');

    // Standard BLE Heart Rate Service UUIDs
    const HEART_RATE_SERVICE = 'heart_rate';
    const HEART_RATE_MEASUREMENT_CHAR = 'heart_rate_measurement';

    connectBtn.addEventListener('click', async () => {
        try {
            statusText.textContent = 'Requesting Bluetooth device...';
            
            // 1. Request device with Heart Rate Service
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [HEART_RATE_SERVICE] }]
            });

            statusText.textContent = `Connecting to ${device.name}...`;
            
            // 2. Connect to GATT Server
            const server = await device.gatt.connect();
            
            // 3. Get Heart Rate Service
            const service = await server.getPrimaryService(HEART_RATE_SERVICE);
            
            // 4. Get Heart Rate Measurement Characteristic
            const characteristic = await service.getCharacteristic(HEART_RATE_MEASUREMENT_CHAR);
            
            // 5. Start notifications and parse data
            await characteristic.startNotifications();
            statusText.textContent = 'Connected! Reading data...';
            heartIcon.classList.add('pulse');
            connectBtn.disabled = true;

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const value = event.target.value;
                // First byte contains flags. Bit 0 specifies format (8-bit vs 16-bit)
                const flags = value.getUint8(0);
                const is16Bit = flags & 0x01;
                
                let heartRate;
                if (is16Bit) {
                    heartRate = value.getUint16(1, true); // Little endian
                } else {
                    heartRate = value.getUint8(1);
                }
                
                bpmDisplay.textContent = heartRate;
            });

            // Handle disconnection
            device.addEventListener('gattserverdisconnected', () => {
                statusText.textContent = 'Device disconnected.';
                bpmDisplay.textContent = '--';
                heartIcon.classList.remove('pulse');
                connectBtn.disabled = false;
            });

        } catch (error) {
            console.error(error);
            statusText.textContent = `Error: ${error.message}`;
        }
    });

    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registered!', reg))
                .catch(err => console.log('Service Worker failed:', err));
        });
    }
</script>
</body>
</html>
